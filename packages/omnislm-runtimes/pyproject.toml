[project]
name = "omnislm-runtimes"
version = "0.1.0"
description = "LLM inference runtime adapters for OmniSLM"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["omnislm-core>=0.1.0", "httpx>=0.27.0"]

[project.optional-dependencies]
ollama = []
vllm = ["openai>=1.0"]
transformers = ["transformers>=4.40", "torch>=2.0"]
onnx = ["onnxruntime>=1.17"]

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
