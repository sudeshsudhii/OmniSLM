[project]
name = "omnislm-observability"
version = "0.1.0"
description = "Monitoring and tracing for OmniSLM"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["omnislm-core>=0.1.0", "structlog>=24.2.0"]

[project.optional-dependencies]
metrics = ["prometheus-client>=0.20"]
tracing = ["opentelemetry-api>=1.24", "opentelemetry-sdk>=1.24"]

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
