[project]
name = "omnislm"
version = "0.1.0"
description = "OmniSLM — The open-source AI framework for Small Language Models"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [{ name = "OmniSLM Team" }]
dependencies = [
    "omnislm-core>=0.1.0",
    "fastapi[standard]>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "httpx>=0.27.0",
    "structlog>=24.2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
runtimes = ["omnislm-runtimes>=0.1.0"]
memory = ["omnislm-memory>=0.1.0"]
rag = ["omnislm-rag>=0.1.0"]
agents = ["omnislm-agents>=0.1.0"]
plugins = ["omnislm-plugins>=0.1.0"]
workflows = ["omnislm-workflows>=0.1.0"]
observability = ["omnislm-observability>=0.1.0"]
evaluation = ["omnislm-evaluation>=0.1.0"]
all = [
    "omnislm-runtimes>=0.1.0",
    "omnislm-memory>=0.1.0",
    "omnislm-rag>=0.1.0",
    "omnislm-agents>=0.1.0",
    "omnislm-plugins>=0.1.0",
    "omnislm-workflows>=0.1.0",
    "omnislm-observability>=0.1.0",
    "omnislm-evaluation>=0.1.0",
]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.4"]

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
