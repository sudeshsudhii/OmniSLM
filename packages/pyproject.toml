[project]
name = "omnislm-workspace"
version = "0.1.0"
description = "OmniSLM Framework — Workspace Root"
requires-python = ">=3.11"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
